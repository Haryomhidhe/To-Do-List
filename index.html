<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>To Do List </h1> 
      <input placeholder="search Task" id="search-bar">
      <button id="create-btn">create +</button>
       <button id="new-column"> Add column +</button>
    </header>
    <div class="board">
      <div class="column" id="inbox"><h3>Inbox</h3>
        <div id="inbox-card"></div>
      </div>
      <div class="column" id="urgent"><h3>Urgent</h3>
        <div id="urgent-card"></div>
      </div>
      <div class="column" id="planned"><h3>Planned</h3>
        <div id="planned-card"></div>
      </div>
      <div class="column" id="done"><h3>Done</h3>
        <div id="done-card"></div>
      </div>
      <div>
      </div>
      </div>
</div>

</div>
  <div id="task-modal" class="modal hidden">
    <div class="modal-content">
      <h3>New Task</h3>
      <input type="text" id="modal-task-name" placeholder="What is the task?">
      <textarea id="modal-description" placeholder="Add a description"></textarea>
    <select id="modal-task-category" title="Task Category" >
        <option value="Inbox">Inbox</option>
        <option value="Urgent">Urgent</option>
        <option value="Planned">Planned</option>
      </select>
      <input placeholder="Date and time" id="date" type="datetime-local">

      <div class="modal-buttons">
        <button id="cancel-btn">Cancel</button>
        <button id="save-btn">Save</button>
      </div>
    </div>
  </div>


  <script src="script.js"></script>
</body>
</html>
